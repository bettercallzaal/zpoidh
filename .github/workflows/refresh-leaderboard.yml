name: Refresh POIDH Leaderboard

on:
  schedule:
    # Run every 6 hours at :00 UTC (00:00, 06:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run refresh script
        run: python3 scripts/refresh-poidh-leaderboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "poidh-refresh[bot]"
          git config user.email "poidh-refresh@users.noreply.github.com"

          # Check if any data files changed
          if ! git diff --quiet data/; then
            git add data/leaderboard.json data/claims.json data/audit.json
            git commit -m "chore: auto-refresh POIDH leaderboard data

Generated by refresh-leaderboard.yml workflow."
            git push
          else
            echo "No changes to leaderboard data."
          fi
