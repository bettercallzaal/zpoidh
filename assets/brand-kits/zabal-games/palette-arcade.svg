  <text x="540" y="100" font-family="-apple-system,sans-serif" font-size="16" fill="#FAFAFA" opacity="0.7" text-anchor="middle">For collateral that matches the arcade hero - merch, stream overlays, motion</text>

  <g transform="translate(80,160)">
